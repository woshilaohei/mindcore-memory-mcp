name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -e '.[dev]'
    - name: Run tests
      run: |
        mkdir -p $GITHUB_WORKSPACE/_temp
        pytest
      env:
        TMPDIR: ${{ github.workspace }}/_temp
